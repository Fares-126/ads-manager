<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  overflow:hidden;
}
#ad{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<img id="ad"/>

<script>
let ads = [];
let index = 0;

async function loadAds(){
  const res = await fetch("scripts.json?ts=" + Date.now());
  const data = await res.json();
  ads = data.ads;
  showAd();
}

function showAd(){
  if(ads.length === 0) return;

  const ad = ads[index];
  document.getElementById("ad").src = ad.image;

  setTimeout(()=>{
    index = (index + 1) % ads.length;
    showAd();
  }, ad.duration * 1000);
}

loadAds();
</script>

</body>
</html>
