<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}

#ad-container {
  width: 100%;
  height: 100%;
  position: relative;
}

#ad-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

</style>
</head>

<body>

<div id="ad-container">
  <img id="ad-image" src="">
</div>

<script>

let ads = [];
let index = 0;

async function loadAds() {
  try {

    const response = await fetch("scripts.json?ts=" + Date.now());
    const data = await response.json();

    ads = data.ads;

    if (ads.length > 0) {
      showAd();
    }

  } catch (e) {
    console.error("Ads failed to load", e);
  }
}

function showAd() {

  if (ads.length === 0) return;

  const ad = ads[index];

  const img = document.getElementById("ad-image");

  img.src = ad.image;

  setTimeout(() => {

    index = (index + 1) % ads.length;

    showAd();

  }, ad.duration * 1000);

}

loadAds();

</script>

</body>
</html>
